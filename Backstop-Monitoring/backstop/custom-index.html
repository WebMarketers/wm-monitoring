<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>WebMarketers Visual Report - Crash Test Client</title>

    <style>
      @font-face {
        font-family: 'latoregular';
        src: url('./assets/fonts/lato-regular-webfont.woff2') format('woff2'),
             url('./assets/fonts/lato-regular-webfont.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: 'latobold';
        src: url('./assets/fonts/lato-bold-webfont.woff2') format('woff2'),
             url('./assets/fonts/lato-bold-webfont.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }

      :root {
        --wm-primary: #0D2D55;
        --wm-accent: #931834;
        --wm-bg: #E2E7EA;
        --wm-card: #ffffff;
        --wm-text: #1f2937;
        --wm-subtle: #6b7280;
        --wm-border: #d5dbe1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--wm-bg);
        color: var(--wm-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }

      .ReactModal__Body--open {
        overflow: hidden;
      }

      .ReactModal__Body--open .header {
        display: none;
      }

      .wm-topbar {
        background: linear-gradient(90deg, var(--wm-primary), #163f74);
        color: #fff;
        padding: 18px 24px;
        border-bottom: 4px solid var(--wm-accent);
      }

      .wm-topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1600px;
        margin: 0 auto;
      }

      .wm-brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .wm-title {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.2;
      }

      .wm-subtitle {
        font-size: 14px;
        opacity: 0.92;
      }

      .wm-badge {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 13px;
        white-space: nowrap;
      }

      .wm-infobar {
        background: #f8fafc;
        border-bottom: 1px solid var(--wm-border);
        padding: 12px 24px;
      }

      .wm-infobar-inner {
        max-width: 1600px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 20px;
        align-items: center;
        justify-content: space-between;
      }

      .wm-meta {
        font-size: 14px;
        color: var(--wm-subtle);
      }

      .wm-link {
        color: var(--wm-primary);
        text-decoration: none;
        font-weight: 600;
      }

      .wm-link:hover {
        text-decoration: underline;
      }

      #root {
        max-width: 1600px;
        margin: 0 auto;
        padding: 16px 20px 32px;
      }

      @media (max-width: 768px) {
        .wm-topbar,
        .wm-infobar,
        #root {
          padding-left: 14px;
          padding-right: 14px;
        }

        .wm-topbar-inner,
        .wm-infobar-inner {
          align-items: flex-start;
          flex-direction: column;
        }

        .wm-title {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wm-topbar">
      <div class="wm-topbar-inner">
        <div class="wm-brand">
          <div class="wm-title">WebMarketers Visual Monitoring Report</div>
          <div class="wm-subtitle">Client: Crash Test Site</div>
        </div>
        <div class="wm-badge">Protected Internal Report</div>
      </div>
    </div>

    <div class="wm-infobar">
      <div class="wm-infobar-inner">
        <div class="wm-meta">
          Automated BackstopJS visual regression dashboard
        </div>
        <div class="wm-meta">
          Site:
          <a
            class="wm-link"
            href="https://crash-test.s1.webmarketersdev.ca/"
            target="_blank"
            rel="noopener noreferrer"
          >
            crash-test.s1.webmarketersdev.ca
          </a>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      function report(report) {
        window.tests = report;
      }
    </script>
    <script src="config.js"></script>
    <script src="index_bundle.js"></script>
  </body>
</html>
